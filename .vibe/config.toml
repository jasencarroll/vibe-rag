# Project-level Vibe configuration
active_model = "devstral-2"
skill_paths = [".vibe/skills"]

[[mcp_servers]]
name = "memory"
transport = "stdio"
command = "scripts/run-vibe-rag"
args = ["serve"]

[background_mcp_hook]
enabled = true
tool_name = "memory_load_session_context"
task_arg = "task"

[session_memory_hook]
enabled = true
tool_name = "memory_save_session_memory"
summary_tool_name = "memory_save_session_summary"
