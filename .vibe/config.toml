# Project-level Vibe configuration
active_model = "devstral-2"
skill_paths = [".vibe/skills"]

[[mcp_servers]]
name = "memory"
transport = "stdio"
command = "/bin/zsh"
args = ["-lc", "exec \"$(git rev-parse --show-toplevel)/scripts/run-vibe-rag\" serve"]

[[hooks.SessionStart]]
command = "/bin/zsh -lc 'exec \"$(git rev-parse --show-toplevel)/scripts/run-vibe-rag\" hook-session-start --format vibe'"
