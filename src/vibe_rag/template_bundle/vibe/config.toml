# Project-level Vibe configuration
active_model = "devstral-2"
skill_paths = [".vibe/skills"]

[[mcp_servers]]
name = "memory"
transport = "stdio"
command = "/bin/zsh"
args = ["-lc", "source ~/.zprofile >/dev/null 2>&1 || true; source ~/.zshrc >/dev/null 2>&1 || true; __VIBE_RAG_BIN__ serve"]

[background_mcp_hook]
enabled = true
tool_name = "memory_load_session_context"
task_arg = "task"

[session_memory_hook]
enabled = true
tool_name = "memory_save_session_memory"
summary_tool_name = "memory_save_session_summary"
