# Read-only code review agent.
# Usage: vibe --agent reviewer

display_name = "Reviewer"
description = "Read-only agent for code review. Cannot modify files."
safety = "safe"
auto_approve = true
enabled_tools = [
  "read_file",
  "grep",
  "bash",
  "task",
  "todo",
  "ask_user_question",
  "memory_*",
]
