name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version to release, e.g. 0.0.20
        required: true
        type: string

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - name: Prepare release files
        run: python scripts/prepare_release.py --version "${{ inputs.version }}" --notes-out release-notes.md
      - run: uv run --extra dev pytest
      - run: uv build
      - name: Summarize release artifacts
        run: |
          sha256sum dist/* | tee dist.sha256
          {
            echo "## Release ${INPUT_VERSION}"
            echo
            echo "- Commit ref: \`${GITHUB_SHA}\`"
            echo "- Version: \`${INPUT_VERSION}\`"
            echo
            echo "### Release Notes"
            echo
            cat release-notes.md
            echo
            echo "### SHA256"
            echo
            echo '```text'
            cat dist.sha256
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          INPUT_VERSION: ${{ inputs.version }}
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ inputs.version }}
          path: |
            dist/*
            dist.sha256
            release-notes.md
          if-no-files-found: error
      - name: Commit release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/vibe_rag/__init__.py tests/test_cli.py README.md uv.lock CHANGELOG.md
          git commit -m "Release v${{ inputs.version }}"
      - name: Push main
        run: git push origin HEAD:main
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v${{ inputs.version }}" --repo "${{ github.repository }}" --title "v${{ inputs.version }}" --notes-file release-notes.md
      - name: Trigger publish workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run publish.yml --repo "${{ github.repository }}" -f ref="v${{ inputs.version }}"
